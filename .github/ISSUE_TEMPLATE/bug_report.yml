name: Bug Report
description: File a bug report to help us improve UMind
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected to see
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: What device are you using?
      placeholder: e.g. Samsung Galaxy S21, Google Pixel 6
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      description: What version of Android are you running?
      placeholder: e.g. Android 12, Android 13
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: What version of UMind are you using?
      placeholder: e.g. 1.0.0 (check in Me tab)
    validations:
      required: true

  - type: checkboxes
    id: permissions
    attributes:
      label: Permissions
      description: Which permissions are enabled?
      options:
        - label: Accessibility Service is enabled
        - label: Overlay/Display over other apps permission is granted
        - label: Usage Access permission is granted (if applicable)

  - type: textarea
    id: logs
    attributes:
      label: Additional logs or screenshots
      description: If applicable, add any error logs or screenshots
      placeholder: Paste any relevant logs or drag and drop screenshots here

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
        - label: I have tested this with the latest version of the app
          required: true
